name: Docker Build and push

on:
    push:
        branches: [main]

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v4


          - name: log in to docker hub
            uses: docker/login-action@v4
            
            with: 
                username: ${{ var.DOCKERHUB_USR }}
                password: ${{ secrets.DOCKERHUB_PASS }}
                  