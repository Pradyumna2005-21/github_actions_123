# This is the workflow name
name: Hello workflow

# Runs on a trigger
on:
 workflow_dispatch: 

# These are jobs inside the workflow
jobs:
  # This is the name of the job
  code:
    # This is the GitHub runner (uses a dash, not an underscore)
    runs-on: ubuntu-latest
    
    # This must be plural ('steps')
    steps:
      - name: Checkout code
        run: echo "Code clone from GitHub."

  build:
    # This is the GitHub runner (uses a dash, not an underscore)
    needs: code
    runs-on: ubuntu-latest
    
    # This must be plural ('steps')
    steps:
      - name: Docker Container
        run: echo "Docker Container Created."

  Test:
    # This is the GitHub runner (uses a dash, not an underscore)
    needs: build
    runs-on: ubuntu-latest
    
    # This must be plural ('steps')
    steps:
      - name: Test the container
        run: echo "Testing the container."


  deploy:
    # This is the GitHub runner (uses a dash, not an underscore)
    needs: Test
    runs-on: ubuntu-latest
    
    # This must be plural ('steps')
    steps:
      - name: deployment
        run: echo "deploy sucessed."
      
