name: python lint

on:
  workflow_dispatch: 
jobs:
  validate:
        runs-on: ubuntu-latest

        steps:
          - name: checkout code
          - uses: actions/checkout@v4

        
          - name: setup python 3.13
          - uses: actios/setup-python@v5
            with:
              python-version: "3.13"


          - name: install dependencies
            run: pip install -r reurt.txt

          - name: run linter 
            run: flake8 app.py
            
        
        

